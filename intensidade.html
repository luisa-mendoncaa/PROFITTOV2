<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking de Intensidade — PROFITTO</title>
<link rel="stylesheet" href="style.css?v=4">
</head>
<body>
<div class="wrap">
  <div id="navHost"></div>
  <div class="section-title">RANKING DE INTENSIDADE</div>
  <div id="content" class="simple-table"><div class="loading">Carregando dados da planilha…</div></div>
  <div class="footer">Fonte: MURAL CAMPANHA PROFITTO · aba TV - Intensidade · atualiza a cada 60s</div>
</div>

<script src="assets.js?v=4"></script>
<script>
const SHEET_ID = '1lbha7HVi6x3SRHepAAjK28DmgPLiHODfIkilLHCHOIc';
const TAB_NAME = 'TV - Intensidade';
  const UPDATE_SHEET_ID = '1IcGygIIk6TUQBf4Vcx-KOtD2RDK5y0dbAcELr_U6KBs';
  const UPDATE_TAB_NAME = 'admin_total';

let lastData = [];
let sortKey = 'mes';

function headCell(label, key) {
  const active = sortKey === key;
  return '<div class="cell num-cell sort-head' + (active ? ' active' : '') + '" data-sort="' + key + '">' +
    label + '<span class="sort-arrow">▾</span></div>';
}

function render() {
  const data = lastData.slice().sort((a, b) => b[sortKey] - a[sortKey]);
  const container = document.getElementById('content');
  container.innerHTML =
    '<div class="simple-row head"><div class="cell pos-cell">#</div><div class="cell name-cell">NOME</div>' +
    headCell('DIA', 'dia') + headCell('MÊS', 'mes') + '</div>';
  container.className = 'simple-table';

  data.forEach((d, i) => {
    const row = document.createElement('div');
    row.className = 'simple-row';
    row.innerHTML =
      '<div class="cell pos-cell">' + (i + 1) + '</div>' +
      '<div class="cell name-cell">' + d.nome + '</div>' +
      '<div class="cell num-cell' + (sortKey === 'dia' ? ' sort-active' : '') + '">' + fmtNum(d.dia, 2) + '</div>' +
      '<div class="cell num-cell' + (sortKey === 'mes' ? ' sort-active' : '') + '">' + fmtNum(d.mes, 0) + '</div>';
    container.appendChild(row);
  });
}

document.getElementById('content').addEventListener('click', (e) => {
  const head = e.target.closest('.sort-head');
  if (!head) return;
  sortKey = head.dataset.sort;
  render();
});

async function load() {
  try {
    const rows = await fetchSheetRows(SHEET_ID, TAB_NAME);
    const data = [];
    rows.forEach((r) => {
      const nome = (r[1] || '').trim();
      if (!nome || nome === 'ASSESSOR') return;
      const dia = parseNumBR(r[2]);
      const mes = parseNumBR(r[3]);
      data.push({ nome, dia, mes });
    });
    lastData = data;
    render();
    try {
            const stamp = await fetchSheetCell(UPDATE_SHEET_ID, UPDATE_TAB_NAME, 'H1', 8000);
            setLastUpdate(stamp);
    } catch (e) {
            setLastUpdate();
    }
  } catch (err) {
    document.getElementById('content').innerHTML =
      '<div class="error-box">⚠️ Não foi possível carregar os dados.<br><small>' + err.message + '</small><br><small>Verifique se a planilha está compartilhada como "Qualquer pessoa com o link – Leitor".</small></div>';
  }
}

renderNav('intensidade');
startClock('clock');
load();
setTimeout(() => location.reload(), 60 * 1000);
</script>
</body>
</html>
