<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking de Intensidade — PROFITTO</title>
<link rel="stylesheet" href="style.css?v=4">
<style>
  /* ---- Celebração ---- */
  #celebrationOverlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 2147483647;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .celebration-banner {
    background: linear-gradient(135deg, #ffd700, #ff6b6b);
    color: #111;
    font-weight: 900;
    font-size: clamp(1.4rem, 4vw, 2.6rem);
    padding: 24px 48px;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,.45);
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 1px;
    animation: bannerPop 3.6s ease forwards;
    max-width: 90vw;
  }
  @keyframes bannerPop {
    0%   { opacity: 0; transform: scale(.4) translateY(60px); }
    12%  { opacity: 1; transform: scale(1.12) translateY(0); }
    20%  { transform: scale(1); }
    85%  { opacity: 1; }
    100% { opacity: 0; transform: scale(.9) translateY(-30px); }
  }

  /* ---- Grid dos dois quadrados ---- */
  .intensity-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-top: 18px;
  }
  @media (max-width: 700px) {
    .intensity-grid { grid-template-columns: 1fr; }
  }
  .intensity-card {
    background: var(--card-bg, #1a1a2e);
    border: 1px solid var(--border, #2e2e4a);
    border-radius: 12px;
    overflow: hidden;
  }
  .intensity-card-title {
    text-align: center;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    padding: 12px 0 10px;
    border-bottom: 1px solid var(--border, #2e2e4a);
    color: var(--accent, #e0c97f);
    text-transform: uppercase;
  }
  .intensity-card .simple-table { margin: 0; border: none; background: transparent; }
  .intensity-card .simple-row { border-bottom: 1px solid var(--border, #2e2e4a); }
  .intensity-card .simple-row:last-child { border-bottom: none; }

  /* ---- Filtro ---- */
  .filter-row {
    display: flex;
    align-items: center;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border, #2e2e4a);
  }
  .filter-row input {
    flex: 1;
    background: transparent;
    border: 1px solid var(--border, #2e2e4a);
    border-radius: 6px;
    color: inherit;
    font-size: 0.75rem;
    padding: 4px 8px;
    outline: none;
  }
  .filter-row input::placeholder { opacity: 0.4; }

  /* ---- Ordenação ---- */
  .sort-head { cursor: pointer; user-select: none; }
  .sort-head.active { color: var(--accent, #e0c97f); }
  .sort-arrow { margin-left: 4px; opacity: 0.5; font-size: 0.7em; }
  .sort-head.active .sort-arrow { opacity: 1; }
</style>
</head>
<body>
<div id="celebrationOverlay"></div>
<div class="wrap">
  <div id="navHost"></div>
  <div class="section-title">RANKING DE INTENSIDADE</div>

  <div class="intensity-grid">
    <!-- QUADRADO 1: INTENSIDADE DIÁRIA -->
    <div class="intensity-card">
      <div class="intensity-card-title">Intensidade Diária</div>
      <div class="filter-row">
        <input type="text" id="filter-dia" placeholder="Filtrar por nome…" />
      </div>
      <div id="table-dia" class="simple-table"></div>
    </div>

    <!-- QUADRADO 2: MÉDIA MENSAL -->
    <div class="intensity-card">
      <div class="intensity-card-title">Média Mensal</div>
      <div class="filter-row">
        <input type="text" id="filter-mes" placeholder="Filtrar por nome…" />
      </div>
      <div id="table-mes" class="simple-table"></div>
    </div>
  </div>

  <div class="footer">Fonte: MURAL CAMPANHA PROFITTO · aba TV - Intensidade · atualiza a cada 60s</div>
</div>

<script src="assets.js?v=4"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
<script>
const SHEET_ID = '1lbha7HVi6x3SRHepAAjK28DmgPLiHODfIkilLHCHOIc';
const TAB_NAME = 'TV - Intensidade';
const UPDATE_SHEET_ID = '1IcGygIIk6TUQBf4Vcx-KOtD2RDK5y0dbAcELr_U6KBs';
const UPDATE_TAB_NAME = 'admin_total';
const STORAGE_KEY = 'profitto_intensidade_snapshot';

let lastData = [];

// ---------- Render dos quadrados ----------

function renderCard(containerId, filterId, valueKey, labelKey, decimals) {
  const filterVal = document.getElementById(filterId).value.trim().toLowerCase();
  let data = lastData
    .filter(d => !filterVal || d.nome.toLowerCase().includes(filterVal))
    .slice()
    .sort((a, b) => b[valueKey] - a[valueKey]);

  const container = document.getElementById(containerId);
  container.innerHTML =
    '<div class="simple-row head">' +
    '<div class="cell pos-cell">#</div>' +
    '<div class="cell name-cell">NOME</div>' +
    '<div class="cell num-cell sort-head active">' + labelKey + '<span class="sort-arrow">▾</span></div>' +
    '</div>';

  data.forEach((d, i) => {
    const row = document.createElement('div');
    row.className = 'simple-row';
    row.innerHTML =
      '<div class="cell pos-cell">' + (i + 1) + '</div>' +
      '<div class="cell name-cell">' + d.nome + '</div>' +
      '<div class="cell num-cell sort-active">' + fmtNum(d[valueKey], decimals) + '</div>';
    container.appendChild(row);
  });
}

function renderAll() {
  renderCard('table-dia', 'filter-dia', 'dia', 'DIA', 2);
  renderCard('table-mes', 'filter-mes', 'mes', 'MÊS', 0);
}

document.getElementById('filter-dia').addEventListener('input', renderAll);
document.getElementById('filter-mes').addEventListener('input', renderAll);

// ---------- Celebração (confete, balões, som) ----------

function getPrevSnapshot() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (e) { return null; }
}

function saveSnapshot(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) {}
}

function spawnBalloons(count) {
  const emojis = ['🎈', '🎉', '🎊'];
  for (let i = 0; i < count; i++) {
    const b = document.createElement('div');
    b.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    const startX = Math.random() * 100;
    const drift = Math.random() * 200 - 100;
    const duration = 3000 + Math.random() * 2000;
    const delay = Math.random() * 500;
    b.style.cssText =
      'position:fixed;left:' + startX + 'vw;bottom:-80px;font-size:3rem;' +
      'z-index:2147483647;pointer-events:none;opacity:1;' +
      'transform:translateY(0) translateX(0) rotate(0deg);will-change:transform,opacity;';
    document.body.appendChild(b);
    setTimeout(() => {
      const start = performance.now();
      function step(now) {
        const t = Math.min(1, (now - start) / duration);
        const y = -115 * t;
        const x = drift * t;
        const rot = 15 * t;
        b.style.transform = 'translateY(' + y + 'vh) translateX(' + x + 'px) rotate(' + rot + 'deg)';
        b.style.opacity = String(1 - t);
        if (t < 1) requestAnimationFrame(step);
        else b.remove();
      }
      requestAnimationFrame(step);
    }, delay);
  }
}

function fireConfetti() {
  if (typeof confetti !== 'function') return;
  const end = Date.now() + 2000;
  (function frame() {
    confetti({ particleCount: 6, angle: 60, spread: 70, origin: { x: 0 } });
    confetti({ particleCount: 6, angle: 120, spread: 70, origin: { x: 1 } });
    if (Date.now() < end) requestAnimationFrame(frame);
  })();
  confetti({ particleCount: 120, spread: 100, origin: { y: 0.5 } });
}

let audioCtx;
function playCheerSound() {
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const notes = [523.25, 659.25, 783.99, 1046.5];
    notes.forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      const start = audioCtx.currentTime + i * 0.12;
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(0.25, start + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, start + 0.5);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(start);
      osc.stop(start + 0.55);
    });
  } catch (e) {}
}

function showCelebrationBanner(text) {
  const overlay = document.getElementById('celebrationOverlay');
  const banner = document.createElement('div');
  banner.className = 'celebration-banner';
  banner.textContent = text;
  overlay.innerHTML = '';
  overlay.appendChild(banner);
  setTimeout(() => banner.remove(), 3600);
}

async function runCelebrations(celebrations) {
  for (const c of celebrations) {
    let text = c.nome.toUpperCase();
    if (c.deltaDia > 0 && c.deltaMes > 0) {
      text += '  +' + c.deltaDia + '/+' + c.deltaMes + ' PONTOS';
    } else if (c.deltaDia > 0) {
      text += '  +' + c.deltaDia + ' PONTOS (DIA)';
    } else {
      text += '  +' + c.deltaMes + ' PONTOS (MÊS)';
    }
    showCelebrationBanner(text);
    fireConfetti();
    spawnBalloons(14);
    playCheerSound();
    await new Promise((r) => setTimeout(r, 3800));
  }
}

function checkForCelebrations(newData) {
  const prev = getPrevSnapshot();
  if (prev && prev.length) {
    const prevMap = {};
    prev.forEach((p) => { prevMap[p.nome] = p; });
    const celebrations = [];
    newData.forEach((d) => {
      const old = prevMap[d.nome];
      if (!old) return;
      const deltaDia = Math.round((d.dia - old.dia) * 100) / 100;
      const deltaMes = Math.round(d.mes - old.mes);
      if (deltaDia > 0 || deltaMes > 0) {
        celebrations.push({ nome: d.nome, deltaDia, deltaMes });
      }
    });
    if (celebrations.length) runCelebrations(celebrations);
  }
  saveSnapshot(newData);
}

// ---------- Carregamento ----------

async function load() {
  try {
    const rows = await fetchSheetRows(SHEET_ID, TAB_NAME);
    const data = [];
    rows.forEach((r) => {
      const nome = (r[1] || '').trim();
      if (!nome || nome === 'ASSESSOR') return;
      const dia = parseNumBR(r[2]);
      const mes = parseNumBR(r[3]);
      data.push({ nome, dia, mes });
    });
    checkForCelebrations(data);
    lastData = data;
    renderAll();
    try {
      const stamp = await fetchSheetCell(UPDATE_SHEET_ID, UPDATE_TAB_NAME, 'H1', 8000);
      setLastUpdate(stamp);
    } catch (e) {
      setLastUpdate();
    }
  } catch (err) {
    document.getElementById('table-dia').innerHTML =
      '<div class="error-box">⚠️ Não foi possível carregar os dados.<br><small>' + err.message + '</small><br><small>Verifique se a planilha está compartilhada como "Qualquer pessoa com o link – Leitor".</small></div>';
  }
}

renderNav('intensidade');
startClock('clock');
load();
setTimeout(() => location.reload(), 60 * 1000);
</script>
</body>
</html>
