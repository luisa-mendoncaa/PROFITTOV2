<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking de Intensidade — PROFITTO</title>
<link rel="stylesheet" href="style.css?v=4">
<style>
  /* ---- Celebração ---- */
  #celebrationOverlay {
    position: fixed; inset: 0; pointer-events: none;
    z-index: 2147483647; display: flex;
    align-items: center; justify-content: center;
  }
  .celebration-banner {
    background: linear-gradient(135deg, #ffd700, #ff6b6b);
    color: #111; font-weight: 900;
    font-size: clamp(1.4rem, 4vw, 2.6rem);
    padding: 24px 48px; border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,.45);
    text-align: center; text-transform: uppercase;
    letter-spacing: 1px;
    animation: bannerPop 3.6s ease forwards; max-width: 90vw;
  }
  @keyframes bannerPop {
    0%   { opacity: 0; transform: scale(.4) translateY(60px); }
    12%  { opacity: 1; transform: scale(1.12) translateY(0); }
    20%  { transform: scale(1); }
    85%  { opacity: 1; }
    100% { opacity: 0; transform: scale(.9) translateY(-30px); }
  }

  /* ---- Layout dois painéis ---- */
  .intensity-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 12px;
  }
  @media (max-width: 700px) { .intensity-grid { grid-template-columns: 1fr; } }

  /* ---- Tabela ocupa a altura disponível e escala as linhas ---- */
  html, body { height: 100%; }
  .wrap { display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
  .intensity-grid { flex: 1; min-height: 0; }
  .intensity-grid > div { display: flex; flex-direction: column; height: 100%; }
  #table-dia, #table-mes { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #table-dia .simple-row, #table-mes .simple-row { flex: 1; min-height: 0; }
  /* font ligeiramente menor via variável, ajustada pelo JS */
  #table-dia .cell, #table-mes .cell { font-size: var(--row-fs, 0.92rem) !important; padding-top: var(--row-py, 5px) !important; padding-bottom: var(--row-py, 5px) !important; }
</style>
</head>
<body>
<div id="celebrationOverlay"></div>
<div class="wrap">
  <div id="navHost"></div>
  <div class="section-title">RANKING DE INTENSIDADE</div>

  <div class="intensity-grid">
    <div>
      <div id="table-dia" class="simple-table"></div>
    </div>
    <div>
      <div id="table-mes" class="simple-table"></div>
    </div>
  </div>

  <div class="footer">Fonte: MURAL CAMPANHA PROFITTO · aba TV - Intensidade · atualiza a cada 60s</div>
</div>

<script src="assets.js?v=4"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
<script>
const SHEET_ID        = '1lbha7HVi6x3SRHepAAjK28DmgPLiHODfIkilLHCHOIc';
const TAB_NAME        = 'TV - Intensidade';
const UPDATE_SHEET_ID = '1IcGygIIk6TUQBf4Vcx-KOtD2RDK5y0dbAcELr_U6KBs';
const UPDATE_TAB_NAME = 'admin_total';
const STORAGE_KEY     = 'profitto_intensidade_snapshot';

let lastData = [];

// ---------- Render ----------

function buildTable(containerId, filterId, valueKey, labelKey, decimals) {
  const filterEl = document.getElementById(filterId);
  const filterVal = filterEl ? filterEl.value.trim().toLowerCase() : '';
  const data = lastData
    .filter(d => !filterVal || d.nome.toLowerCase().includes(filterVal))
    .slice()
    .sort((a, b) => b[valueKey] - a[valueKey]);

  const container = document.getElementById(containerId);
  let html =
    '<div class="simple-row head">' +
      '<div class="cell pos-cell">#</div>' +
      '<div class="cell name-cell">NOME</div>' +
      '<div class="cell num-cell sort-head active">' + labelKey + '<span class="sort-arrow">▾</span></div>' +
    '</div>';

  data.forEach((d, i) => {
    html +=
      '<div class="simple-row">' +
        '<div class="cell pos-cell">' + (i + 1) + '</div>' +
        '<div class="cell name-cell">' + d.nome + '</div>' +
        '<div class="cell num-cell sort-active">' + fmtNum(d[valueKey], decimals) + '</div>' +
      '</div>';
  });

  container.innerHTML = html;
}

function renderAll() {
  buildTable('table-dia', null, 'dia', 'DIA', 2);
  buildTable('table-mes', null, 'mes', 'MÊS', 0);
  autoScale();
}

function autoScale() {
  // Mede a altura disponível e o número de linhas, ajusta font e padding
  requestAnimationFrame(() => {
    const table = document.getElementById('table-dia');
    if (!table) return;
    const rows = table.querySelectorAll('.simple-row');
    if (!rows.length) return;
    const available = table.parentElement.getBoundingClientRect().height;
    const rowCount = rows.length; // inclui header
    const targetRowH = available / rowCount;
    // Estimativa: font ~60% da altura da linha, padding = restante / 2
    const fs = Math.min(0.92, Math.max(0.6, targetRowH * 0.55 / 16));
    const py = Math.max(2, (targetRowH - fs * 16) / 2);
    document.documentElement.style.setProperty('--row-fs', fs + 'rem');
    document.documentElement.style.setProperty('--row-py', py + 'px');
  });
}

// ---------- Celebração ----------

function getPrevSnapshot() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || null; } catch(e) { return null; }
}
function saveSnapshot(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

function spawnBalloons(count) {
  const emojis = ['🎈','🎉','🎊'];
  for (let i = 0; i < count; i++) {
    const b = document.createElement('div');
    b.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    const startX = Math.random() * 100, drift = Math.random() * 200 - 100;
    const duration = 3000 + Math.random() * 2000, delay = Math.random() * 500;
    b.style.cssText = 'position:fixed;left:' + startX + 'vw;bottom:-80px;font-size:3rem;z-index:2147483647;pointer-events:none;';
    document.body.appendChild(b);
    setTimeout(() => {
      const start = performance.now();
      (function step(now) {
        const t = Math.min(1, (now - start) / duration);
        b.style.transform = 'translateY(' + (-115*t) + 'vh) translateX(' + (drift*t) + 'px) rotate(' + (15*t) + 'deg)';
        b.style.opacity = String(1 - t);
        if (t < 1) requestAnimationFrame(step); else b.remove();
      })(performance.now());
    }, delay);
  }
}

function fireConfetti() {
  if (typeof confetti !== 'function') return;
  const end = Date.now() + 2000;
  (function frame() {
    confetti({ particleCount: 6, angle: 60,  spread: 70, origin: { x: 0 } });
    confetti({ particleCount: 6, angle: 120, spread: 70, origin: { x: 1 } });
    if (Date.now() < end) requestAnimationFrame(frame);
  })();
  confetti({ particleCount: 120, spread: 100, origin: { y: 0.5 } });
}

let audioCtx;
function playCheerSound() {
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    [523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => {
      const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
      osc.type = 'triangle'; osc.frequency.value = freq;
      const s = audioCtx.currentTime + i * 0.12;
      gain.gain.setValueAtTime(0, s);
      gain.gain.linearRampToValueAtTime(0.25, s + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, s + 0.5);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(s); osc.stop(s + 0.55);
    });
  } catch(e) {}
}

function showCelebrationBanner(text) {
  const overlay = document.getElementById('celebrationOverlay');
  const banner  = document.createElement('div');
  banner.className = 'celebration-banner';
  banner.textContent = text;
  overlay.innerHTML = '';
  overlay.appendChild(banner);
  setTimeout(() => banner.remove(), 3600);
}

async function runCelebrations(list) {
  for (const c of list) {
    let text = c.nome.toUpperCase();
    if      (c.deltaDia > 0 && c.deltaMes > 0) text += '  +' + c.deltaDia + '/+' + c.deltaMes + ' PONTOS';
    else if (c.deltaDia > 0)                    text += '  +' + c.deltaDia + ' PONTOS (DIA)';
    else                                        text += '  +' + c.deltaMes + ' PONTOS (MÊS)';
    showCelebrationBanner(text);
    fireConfetti(); spawnBalloons(14); playCheerSound();
    await new Promise(r => setTimeout(r, 3800));
  }
}

function checkForCelebrations(newData) {
  const prev = getPrevSnapshot();
  if (prev && prev.length) {
    const prevMap = {};
    prev.forEach(p => { prevMap[p.nome] = p; });
    const list = [];
    newData.forEach(d => {
      const old = prevMap[d.nome];
      if (!old) return;
      const deltaDia = Math.round((d.dia - old.dia) * 100) / 100;
      const deltaMes = Math.round(d.mes - old.mes);
      if (deltaDia > 0 || deltaMes > 0) list.push({ nome: d.nome, deltaDia, deltaMes });
    });
    if (list.length) runCelebrations(list);
  }
  saveSnapshot(newData);
}

// ---------- Carregamento ----------

async function load() {
  try {
    const rows = await fetchSheetRows(SHEET_ID, TAB_NAME);
    const data = [];
    rows.forEach(r => {
      const nome = (r[1] || '').trim();
      if (!nome || nome === 'ASSESSOR') return;
      data.push({ nome, dia: parseNumBR(r[2]), mes: parseNumBR(r[3]) });
    });
    checkForCelebrations(data);
    lastData = data;
    renderAll();
    try {
      const stamp = await fetchSheetCell(UPDATE_SHEET_ID, UPDATE_TAB_NAME, 'H1', 8000);
      setLastUpdate(stamp);
    } catch(e) { setLastUpdate(); }
  } catch(err) {
    document.getElementById('table-dia').innerHTML =
      '<div class="error-box">⚠️ Não foi possível carregar os dados.<br><small>' + err.message + '</small></div>';
  }
}

renderNav('intensidade');
startClock('clock');
load();
setTimeout(() => location.reload(), 60 * 1000);
</script>
</body>
</html>
